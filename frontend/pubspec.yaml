name: senior_strength
description: 中老年力量训练APP - AI姿态检测 + 家庭账号 + 订阅制
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.1.0
  
  # Network
  dio: ^5.4.0
  pretty_dio_logger: ^3.1.3
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Video Player
  video_player: ^2.8.2
  chewie: ^1.7.1
  
  # MediaPipe (AI Pose Detection)
  mediapipe_pose: ^0.0.1
  camera: ^0.10.5+9
  
  # Permissions
  permission_handler: ^11.2.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # Date/Time
  intl: ^0.19.0
  
  # Image Picker
  image_picker: ^1.0.7
  
  # URL Launcher
  url_launcher: ^6.2.2
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true